<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .game-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 20px;
        }

        .score, .high-score {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            min-width: 120px;
        }

        .game-board {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.2);
            margin: 0 auto 20px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
        }

        .controls {
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
            margin: 0 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255, 107, 107, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 20px;
            font-size: 1rem;
            opacity: 0.8;
            line-height: 1.6;
        }

        .game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
        }

        .game-over-title {
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }

        .final-score {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .mobile-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mobile-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
            
            .game-container {
                padding: 20px;
                margin: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .game-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇游戏</h1>
        
        <div class="game-info">
            <div class="score">分数: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
        </div>
        
        <canvas id="gameCanvas" class="game-board" width="400" height="400"></canvas>
        
        <div class="controls">
            <button class="btn" onclick="startGame()">开始游戏</button>
            <button class="btn" onclick="pauseGame()">暂停/继续</button>
            <button class="btn" onclick="resetGame()">重新开始</button>
        </div>
        
        <div class="instructions">
            🎮 使用方向键或下方按钮控制蛇的移动<br>
            🍎 吃掉红色食物获得分数<br>
            ⚡ 小心不要撞到墙壁或自己的身体！
        </div>
        
        <div class="mobile-controls">
            <div></div>
            <button class="mobile-btn" onclick="changeDirection('up')">⬆️</button>
            <div></div>
            <button class="mobile-btn" onclick="changeDirection('left')">⬅️</button>
            <button class="mobile-btn" onclick="changeDirection('down')">⬇️</button>
            <button class="mobile-btn" onclick="changeDirection('right')">➡️</button>
        </div>
    </div>
    
    <div class="game-over-screen" id="gameOverScreen">
        <div class="game-over-title">游戏结束!</div>
        <div class="final-score">最终分数: <span id="finalScore">0</span></div>
        <button class="btn" onclick="restartGame()">再来一局</button>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.gridSize = 20;
                this.tileCount = this.canvas.width / this.gridSize;
                
                this.snake = [
                    {x: 10, y: 10}
                ];
                this.food = {};
                this.dx = 0;
                this.dy = 0;
                this.score = 0;
                this.highScore = localStorage.getItem('snakeHighScore') || 0;
                this.gameRunning = false;
                this.gamePaused = false;
                this.gameLoop = null;
                
                this.updateUI();
                this.generateFood();
                this.draw();
                this.setupEventListeners();
            }
            
            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (!this.gameRunning || this.gamePaused) return;
                    
                    switch(e.key) {
                        case 'ArrowUp':
                            if (this.dy !== 1) {
                                this.dx = 0;
                                this.dy = -1;
                            }
                            break;
                        case 'ArrowDown':
                            if (this.dy !== -1) {
                                this.dx = 0;
                                this.dy = 1;
                            }
                            break;
                        case 'ArrowLeft':
                            if (this.dx !== 1) {
                                this.dx = -1;
                                this.dy = 0;
                            }
                            break;
                        case 'ArrowRight':
                            if (this.dx !== -1) {
                                this.dx = 1;
                                this.dy = 0;
                            }
                            break;
                    }
                });
            }
            
            generateFood() {
                this.food = {
                    x: Math.floor(Math.random() * this.tileCount),
                    y: Math.floor(Math.random() * this.tileCount)
                };
                
                // 确保食物不生成在蛇身上
                for (let segment of this.snake) {
                    if (segment.x === this.food.x && segment.y === this.food.y) {
                        this.generateFood();
                        return;
                    }
                }
            }
            
            update() {
                if (!this.gameRunning || this.gamePaused) return;
                
                const head = {x: this.snake[0].x + this.dx, y: this.snake[0].y + this.dy};
                
                // 检查撞墙
                if (head.x < 0 || head.x >= this.tileCount || head.y < 0 || head.y >= this.tileCount) {
                    this.gameOver();
                    return;
                }
                
                // 检查撞到自己
                for (let segment of this.snake) {
                    if (head.x === segment.x && head.y === segment.y) {
                        this.gameOver();
                        return;
                    }
                }
                
                this.snake.unshift(head);
                
                // 检查是否吃到食物
                if (head.x === this.food.x && head.y === this.food.y) {
                    this.score += 10;
                    this.generateFood();
                    this.updateUI();
                    
                    // 更新最高分
                    if (this.score > this.highScore) {
                        this.highScore = this.score;
                        localStorage.setItem('snakeHighScore', this.highScore);
                    }
                } else {
                    this.snake.pop();
                }
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= this.tileCount; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.gridSize, 0);
                    this.ctx.lineTo(i * this.gridSize, this.canvas.height);
                    this.ctx.stroke();
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.gridSize);
                    this.ctx.lineTo(this.canvas.width, i * this.gridSize);
                    this.ctx.stroke();
                }
                
                // 绘制蛇
                for (let i = 0; i < this.snake.length; i++) {
                    const segment = this.snake[i];
                    const gradient = this.ctx.createLinearGradient(
                        segment.x * this.gridSize,
                        segment.y * this.gridSize,
                        (segment.x + 1) * this.gridSize,
                        (segment.y + 1) * this.gridSize
                    );
                    
                    if (i === 0) {
                        // 蛇头
                        gradient.addColorStop(0, '#4ecdc4');
                        gradient.addColorStop(1, '#2ecc71');
                    } else {
                        // 蛇身
                        gradient.addColorStop(0, '#27ae60');
                        gradient.addColorStop(1, '#16a085');
                    }
                    
                    this.ctx.fillStyle = gradient;
                    this.ctx.fillRect(
                        segment.x * this.gridSize + 1,
                        segment.y * this.gridSize + 1,
                        this.gridSize - 2,
                        this.gridSize - 2
                    );
                    
                    // 添加圆角效果
                    this.ctx.beginPath();
                    this.ctx.roundRect(
                        segment.x * this.gridSize + 2,
                        segment.y * this.gridSize + 2,
                        this.gridSize - 4,
                        this.gridSize - 4,
                        3
                    );
                    this.ctx.fill();
                }
                
                // 绘制食物
                const foodGradient = this.ctx.createRadialGradient(
                    this.food.x * this.gridSize + this.gridSize / 2,
                    this.food.y * this.gridSize + this.gridSize / 2,
                    0,
                    this.food.x * this.gridSize + this.gridSize / 2,
                    this.food.y * this.gridSize + this.gridSize / 2,
                    this.gridSize / 2
                );
                foodGradient.addColorStop(0, '#ff6b6b');
                foodGradient.addColorStop(1, '#e74c3c');
                
                this.ctx.fillStyle = foodGradient;
                this.ctx.beginPath();
                this.ctx.arc(
                    this.food.x * this.gridSize + this.gridSize / 2,
                    this.food.y * this.gridSize + this.gridSize / 2,
                    this.gridSize / 2 - 2,
                    0,
                    2 * Math.PI
                );
                this.ctx.fill();
            }
            
            gameLoop() {
                this.update();
                this.draw();
            }
            
            start() {
                if (this.gameRunning) return;
                
                this.gameRunning = true;
                this.gamePaused = false;
                this.gameLoop = setInterval(() => this.gameLoop(), 150);
            }
            
            pause() {
                this.gamePaused = !this.gamePaused;
            }
            
            reset() {
                this.stop();
                this.snake = [{x: 10, y: 10}];
                this.dx = 0;
                this.dy = 0;
                this.score = 0;
                this.generateFood();
                this.updateUI();
                this.draw();
            }
            
            stop() {
                this.gameRunning = false;
                this.gamePaused = false;
                if (this.gameLoop) {
                    clearInterval(this.gameLoop);
                    this.gameLoop = null;
                }
            }
            
            gameOver() {
                this.stop();
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').style.display = 'block';
            }
            
            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
            }
        }
        
        // 添加 roundRect 方法支持
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.beginPath();
                this.moveTo(x + radius, y);
                this.lineTo(x + width - radius, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.lineTo(x + width, y + height - radius);
                this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.lineTo(x + radius, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
                this.closePath();
            };
        }
        
        // 游戏实例
        let game;
        
        // 初始化游戏
        window.addEventListener('load', () => {
            game = new SnakeGame();
        });
        
        // 控制函数
        function startGame() {
            if (!game.gameRunning) {
                game.start();
            }
        }
        
        function pauseGame() {
            if (game.gameRunning) {
                game.pause();
            }
        }
        
        function resetGame() {
            game.reset();
        }
        
        function restartGame() {
            document.getElementById('gameOverScreen').style.display = 'none';
            game.reset();
            game.start();
        }
        
        function changeDirection(direction) {
            if (!game.gameRunning || game.gamePaused) return;
            
            switch(direction) {
                case 'up':
                    if (game.dy !== 1) {
                        game.dx = 0;
                        game.dy = -1;
                    }
                    break;
                case 'down':
                    if (game.dy !== -1) {
                        game.dx = 0;
                        game.dy = 1;
                    }
                    break;
                case 'left':
                    if (game.dx !== 1) {
                        game.dx = -1;
                        game.dy = 0;
                    }
                    break;
                case 'right':
                    if (game.dx !== -1) {
                        game.dx = 1;
                        game.dy = 0;
                    }
                    break;
            }
        }
    </script>
</body>
</html>
